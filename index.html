function listSection(lbl,arr,color,delFn,subFn,useId=false){
  if(!arr.length) return `<div style="font-size:10px;color:rgba(255,255,255,.2);text-align:center;padding:8px 0 12px;">Порожньо</div>`;
  return `<div class="dyn-list">${arr.map((c,i)=>`
    <div class="dyn-item">
      <div class="dyn-dot" style="background:${color};"></div>
      <div style="flex:1;min-width:0;">
        <div class="dyn-name">${c.name}</div>
        ${subFn?`<div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:1px;">${subFn(c)}</div>`:''}
      </div>
      <span class="dyn-amt" style="color:${color};">${c.amount?`${fmt(c.amount)} Kč`:c.val||''}</span>
      <button onclick="${delFn}('${useId?c.id:i}')" style="background:none;border:none;color:rgba(255,255,255,.2);font-size:14px;cursor:pointer;margin-left:8px;padding:2px 4px;">✕</button>
    </div>`).join('')}</div>`;
}

function saveAutoSettings(){
  const s=state.settings;
  // Read ALL fields BEFORE any render call
  const fpEl=document.getElementById('st-fuel-p');
  const fcEl=document.getElementById('st-fuel-c');
  const amEl=document.getElementById('st-amort');
  const fp=fpEl?parseFloat(fpEl.value):NaN;
  const fc=fcEl?parseFloat(fcEl.value):NaN;
  const am=amEl?parseFloat(amEl.value):NaN;
  // Only update if field exists and has a valid value
  if(fpEl&&!isNaN(fp)) s.fuelPrice=fp;
  if(fcEl&&!isNaN(fc)) s.fuelCons=fc;
  if(amEl&&!isNaN(am)) s.amort=am;
  save();
  showToast(t('settingsSaved'));
  // Render AFTER saving so fields show correct saved values
  renderProfile();
  renderDash();
}

function setLang(c){ state.settings.lang=c; state.lang=c; save(); renderAll(); }
function toggleFuel(v){ state.settings.fuelEnabled=v; save(); renderProfile(); renderDash(); }
function toggleDph(v){ state.settings.dphEnabled=v; save(); renderProfile(); renderDash(); }

function addOdometer(){
  const d=document.getElementById('odo-date')?.value||today();
  const v=parseInt(document.getElementById('odo-km')?.value)||0;
  if(!v){showToast(t('fillAll'));return;}
  if(!state.odometerLog)state.odometerLog=[];
  state.odometerLog=state.odometerLog.filter(e=>e.date!==d);
  state.odometerLog.push({id:Date.now()+'',date:d,km:v});
  save();showToast(t('added'));renderProfile();
}


function saveSettings(){
  const g=id=>document.getElementById(id);
  if(g('st-goal')) state.settings.dailyGoal = parseInt(g('st-goal').value)||1800;
  if(g('st-comm')) state.settings.boltCommission=parseInt(g('st-comm').value)||25;
  if(g('st-amort')) state.settings.amort = parseFloat(g('st-amort').value)||0;
  if(state.settings.fuelEnabled){
    if(g('st-fprice')) state.settings.fuelPrice = parseFloat(g('st-fprice').value)||41;
    if(g('st-fcons'))  state.settings.fuelCons  = parseFloat(g('st-fcons').value)||0;
  }
  if(state.settings.incomeTaxEnabled && g('st-taxrate'))
    state.settings.incomeTaxRate=parseInt(g('st-taxrate').value)||15;
  save(); showToast(t('settingsSaved')); renderAll();
}

function closeModal(){ document.getElementById('modal').style.display='none'; }

// ── TABS ──
let curTab='dash';
function showTab(name){
  document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  curTab=name;
  if(name!=='profile') _profTab='main';
  document.getElementById('content').scrollTop=0;
  updateHeaderBtn();
  if(name==='dash') renderDash();
  if(name==='reports'){ _expandedDay=null; renderReports(); }
  else if(name==='profile') renderProfile();
}
function isUserTyping(){
  const a=document.activeElement;
  return a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.isContentEditable);
}

function renderAll(){
  if(isUserTyping()) return; // Don't re-render while user is typing
  if(curTab==='dash') renderDash();
  else if(curTab==='reports') renderReports();
  else if(curTab==='profile') renderProfile();
}

// ── TOAST ──
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ── INIT ──
load();
checkRollover();
checkArchive();
document.getElementById('ln-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('ln-email')?.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

// ── AUTO LOGIN: check existing session ──
(async()=>{
  try{
    const {data:{session}} = await _sb.auth.getSession();
    if(session){
      state.user = session.user.user_metadata?.name || session.user.email.split('@')[0];
      state.role = 'driver';
      const loaded = await loadFromCloud();
      if(!loaded) load();
      if(!state.onboardingDone) startOnboarding(); else showApp();
    } else {
      load();
    }
  }catch(e){ load(); }
})();
if(state.user){
  if(!state.onboardingDone && state.role==='driver'){
    startOnboarding();
  } else {
    showApp();
    // Auto-sync every 30 seconds
    setInterval(()=>{ if(state.user) syncBolt(true); }, 30000);
  }
}
if(state.settings?.notifEnabled) scheduleNotif();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    // Inline service worker via blob
    const swCode = `
const CACHE = 'drivestat-v1';
const URLS = ['/'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
});
`;
    const blob = new Blob([swCode], {type:'application/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).then(r => {
      console.log('SW registered');
    }).catch(e => console.log('SW error:', e));
  });
}
</script>
