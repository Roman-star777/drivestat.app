            ${s.odometerBase?`<button onclick="clearOdometerBase()" style="background:rgba(255,69,69,.08);border:1px solid rgba(255,69,69,.15);border-radius:9px;color:#FF6B6B;font-size:11px;padding:8px 10px;cursor:pointer;font-family:inherit;">× Скинути</button>`:''}
          </div>
          ${s.odometerBase?`<div style="font-size:9px;color:rgba(99,102,241,.6);margin-top:6px;">Активна база: ${fmt(s.odometerBase)} км</div>`:''}
        </div>
        <div class="dyn-list">
          ${(state.odometerLog||[]).slice().reverse().map((e,i,arr)=>{
            const prev=arr[i+1];
            const diff=prev&&e.km>prev.km?e.km-prev.km:null;
            const isBase=s.odometerBase&&e.km===s.odometerBase;
            return `<div class="dyn-item">
              <div class="dyn-dot" style="background:${isBase?'#818CF8':'rgba(99,102,241,.6)'};">
              </div>
              <div style="flex:1;min-width:0;">
                <div class="dyn-name">${e.date}${isBase?' <span style="font-size:8px;background:rgba(99,102,241,.15);color:#818CF8;padding:1px 5px;border-radius:4px;">⚓ БАЗА</span>':''}</div>
                ${diff?`<div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:1px;">+${fmt(diff)} км за день</div>`:''}
              </div>
              <span class="dyn-amt" style="color:#818CF8;">${fmt(e.km)} км</span>
              <button onclick="delOdometer('${e.id}')" style="background:none;border:none;color:rgba(255,255,255,.2);font-size:14px;cursor:pointer;margin-left:8px;padding:2px 4px;">✕</button>
            </div>`;
          }).join('')}
        </div>
        <div class="add-row" style="margin-top:8px;">
          <input class="add-inp" id="odo-date" type="date" value="${today()}" style="width:120px;">
          <input class="add-inp" id="odo-km" type="number" inputmode="numeric" placeholder="напр. 45230 км">
          <button class="add-btn" onclick="addOdo()">+</button>
        </div>
      </div>`:''}
      <div class="sec-lbl" style="margin-top:4px;">${t('taxSection')}</div>
      <div class="st-card"><div><div class="st-lbl">${t('dph')}</div><div class="st-hint">${s.dphEnabled?`${s.dphRate||21}%`:'Вимкнено'}</div></div>
        <label class="tog"><input type="checkbox" ${s.dphEnabled?'checked':''} onchange="toggleDph(this.checked)"><span class="tog-sl"></span></label></div>
      <div class="st-card"><div><div class="st-lbl">${t('incomeTax')}</div><div class="st-hint">${s.incomeTaxEnabled?`${s.incomeTaxRate||15}%`:'Вимкнено'}</div></div>
        <label class="tog"><input type="checkbox" ${s.incomeTaxEnabled?'checked':''} onchange="toggleIncomeTax(this.checked)"><span class="tog-sl"></span></label></div>
      <button class="btn-logout" onclick="logout()" style="margin-top:14px;">${t('logout')}</button>
    `:''}
  `;
}

function saveMainSettings(){
  state.settings.dailyGoal=parseInt(document.getElementById('st-goal')?.value)||1800;
  save(); showToast(t('settingsSaved')); renderDash();
}
function saveTaxSettings(){
  state.settings.incomeTaxRate=parseInt(document.getElementById('st-taxrate')?.value)||15;
  save(); showToast(t('settingsSaved')); renderDash();
}
function saveOdometerBase(){
  const v=parseInt(document.getElementById('odo-base')?.value);
  if(!isNaN(v)&&v>0){state.settings.odometerBase=v;save();showToast('⚓ Базу одометра збережено');renderProfile();}
}
function clearOdometerBase(){
  delete state.settings.odometerBase;save();showToast('Базу скинуто');renderProfile();
}

function listSection(lbl,arr,color,delFn,subFn,useId=false){
  if(!arr.length) return `<div style="font-size:10px;color:rgba(255,255,255,.2);text-align:center;padding:8px 0 12px;">Порожньо</div>`;
  return `<div class="dyn-list">${arr.map((c,i)=>`
    <div class="dyn-item">
      <div class="dyn-dot" style="background:${color};"></div>
      <div style="flex:1;min-width:0;">
        <div class="dyn-name">${c.name}</div>
        ${subFn?`<div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:1px;">${subFn(c)}</div>`:''}
      </div>
      <span class="dyn-amt" style="color:${color};">${c.amount?`${fmt(c.amount)} Kč`:c.val||''}</span>
      <button onclick="${delFn}('${useId?c.id:i}')" style="background:none;border:none;color:rgba(255,255,255,.2);font-size:14px;cursor:pointer;margin-left:8px;padding:2px 4px;">✕</button>
    </div>`).join('')}</div>`;
}

function saveAutoSettings(){
  const s=state.settings;
  const fp=parseFloat(document.getElementById('st-fuel-p')?.value);
  const fc=parseFloat(document.getElementById('st-fuel-c')?.value);
  const am=parseFloat(document.getElementById('st-amort')?.value);
  s.fuelPrice = isNaN(fp)?0:fp;
  s.fuelCons  = isNaN(fc)?0:fc;   // empty → 0 → no fuel cost
  s.amort     = isNaN(am)?0:am;   // empty → 0 → no amortization
  save();showToast(t('settingsSaved'));renderDash();
}

// ── SETTINGS ACTIONS ──
function setLang(c){ state.settings.lang=c; state.lang=c; save(); renderAll(); }
function toggleFuel(v){ state.settings.fuelEnabled=v; save(); renderProfile(); renderDash(); }
function toggleDph(v){ state.settings.dphEnabled=v; save(); renderProfile(); renderDash(); }
function toggleTax(v){ state.settings.incomeTaxEnabled=v; save(); renderProfile(); renderDash(); }
function toggleBoltKm(v){ state.settings.boltKmEnabled=v; save(); renderProfile(); renderDash(); }
function toggleKmSource(v){ state.settings.boltKmEnabled=v; save(); renderProfile(); renderDash(); }

function addOdometer(){
  const d=document.getElementById('odo-date')?.value||today();
  const v=parseInt(document.getElementById('odo-val')?.value)||0;
  if(!v){showToast(t('fillAll'));return;}
  if(!state.odometerLog)state.odometerLog=[];
  // Replace if same date exists
  state.odometerLog=state.odometerLog.filter(e=>e.date!==d);
  state.odometerLog.push({id:Date.now()+'',date:d,value:v});
  save();showToast(t('added'));renderProfile();
}


function saveSettings(){
  const g=id=>document.getElementById(id);
  if(g('st-goal')) state.settings.dailyGoal = parseInt(g('st-goal').value)||1800;
  if(g('st-comm')) state.settings.boltCommission=parseInt(g('st-comm').value)||25;
  if(g('st-amort')) state.settings.amort = parseFloat(g('st-amort').value)||0;
  if(state.settings.fuelEnabled){
    if(g('st-fprice')) state.settings.fuelPrice = parseFloat(g('st-fprice').value)||41;
    if(g('st-fcons'))  state.settings.fuelCons  = parseFloat(g('st-fcons').value)||0;
  }
  if(state.settings.incomeTaxEnabled && g('st-taxrate'))
    state.settings.incomeTaxRate=parseInt(g('st-taxrate').value)||15;
  save(); showToast(t('settingsSaved')); renderAll();
}

// ── DYNAMIC LISTS ──
function addMonthly(){
  const n=document.getElementById('mc-name')?.value.trim();
  const a=parseInt(document.getElementById('mc-amt')?.value)||0;
  const d=parseInt(document.getElementById('mc-day')?.value)||1;
  if(!n||!a){showToast(t('fillAll'));return;}
  if(!state.monthlyFixedCosts)state.monthlyFixedCosts=[];
  state.monthlyFixedCosts.push({id:Date.now()+'',name:n,amount:a,dueDay:d});
  save();showToast(t('added'));renderProfile();
}

function addWeeklyIncome(){
  const n=document.getElementById('wi-name')?.value.trim();
  const a=parseInt(document.getElementById('wi-amt')?.value)||0;
  if(!n||!a){showToast(t('fillAll'));return;}
  if(!state.weeklyIncome)state.weeklyIncome=[];

function delWeeklyIncome(id){
  const item=(state.weeklyIncome||[]).find(c=>c.id===id);
  if(!item)return;
  state.weeklyIncome=state.weeklyIncome.filter(c=>c.id!==id);
  save();renderProfile();renderDash();
  showUndoToast('🗑','Видалено тижневий дохід',`${item.name} · +${fmt(item.amount)} Kč`,()=>{
    state.weeklyIncome.push(item);save();renderProfile();renderDash();
  });
}

// ── MODAL (unused now but kept for future) ──
function closeModal(){ document.getElementById('modal').style.display='none'; }
function closeModalBg(e){ if(e.target.id==='modal') closeModal(); }
function saveModal(){ closeModal(); }

// ── TABS ──
let curTab='dash';
function showTab(name){
  document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  curTab=name;
  if(name!=='profile') _profTab='main';
  document.getElementById('content').scrollTop=0;
  updateHeaderBtn();
  if(name==='dash') renderDash();
  if(name==='reports'){ _expandedDay=null; renderReports(); }
  else if(name==='profile') renderProfile();
}
function isUserTyping(){
  const a=document.activeElement;
  return a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.isContentEditable);
}

function renderAll(){
  if(isUserTyping()) return; // Don't re-render while user is typing
  if(curTab==='dash') renderDash();
  else if(curTab==='reports') renderReports();
  else if(curTab==='profile') renderProfile();
}

// ── TOAST ──
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ── INIT ──
load();
checkRollover();
checkArchive();
document.getElementById('ln-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
if(state.user){
  if(!state.onboardingDone && state.role==='driver'){
    startOnboarding();
  } else {
    showApp();
    // Auto-sync every 30 seconds
    setInterval(()=>{ if(state.user) syncBolt(true); }, 30000);
  }
}
if(state.settings?.notifEnabled) scheduleNotif();
</script>
