/* ── LOGIN ── */
#login-screen{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px 24px;background:#000;}
.ln-top{text-align:center;margin-bottom:32px;}
.ln-icon{font-size:52px;display:block;margin-bottom:12px;}
.ln-brand{font-size:30px;font-weight:700;color:#fff;letter-spacing:-.5px;}
.ln-brand span{color:#4B7BFF;}
.ln-slogan{font-size:13px;color:rgba(255,255,255,.3);margin-top:6px;}
.role-row{display:flex;gap:10px;width:100%;max-width:320px;margin-bottom:22px;}
.role-btn{flex:1;padding:13px 8px;border-radius:14px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;text-align:center;transition:all .15s;}
.role-btn.sel{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent);}
.role-icon{font-size:20px;display:block;margin-bottom:4px;}
.ln-form{width:100%;max-width:320px;}
.ln-lbl{font-size:10px;color:rgba(255,255,255,.3);font-weight:700;letter-spacing:.14em;margin-bottom:6px;display:block;}
.ln-inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#fff;padding:15px 16px;font-size:16px;font-family:inherit;margin-bottom:12px;outline:none;-webkit-appearance:none;}
.ln-inp:focus{border-color:var(--accent);}
.ln-btn{width:100%;padding:17px;background:#fff;border:none;border-radius:14px;color:#000;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.3px;}
.ln-err{font-size:12px;color:#FF453A;text-align:center;margin-top:8px;display:none;}
.ln-ver{font-size:10px;color:rgba(255,255,255,.1);margin-top:24px;text-align:center;}

/* ── MAIN ── */
#main-app{display:none;height:100%;flex-direction:column;}
header{background:rgba(2,8,10,.2);padding:14px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;backdrop-filter:blur(16px);}
.h-brand{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:.2em;font-weight:600;}
.h-name{font-size:18px;font-weight:700;color:#fff;margin-top:1px;letter-spacing:-.5px;}
.h-sync{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;color:rgba(255,255,255,.5);padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;}
.h-sync.syncing{opacity:.5;pointer-events:none;}
.sdot{width:6px;height:6px;border-radius:50%;background:#34D399;flex-shrink:0;}
.sdot.spin{background:#FFC400;animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tab-pane{display:none;padding:14px 14px 100px;}
.tab-pane.active{display:block;}

nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(4,20,26,.55);backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.08);display:flex;padding:8px 0 max(12px,env(safe-area-inset-bottom));z-index:50;}
.nb{flex:1;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 0;font-family:inherit;}
.nb-icon{font-size:22px;}
.nb-lbl{font-size:9px;color:rgba(255,255,255,.2);font-weight:500;}
.nb.active .nb-lbl{color:#4B7BFF;font-weight:700;}
.nb-dot{width:4px;height:4px;border-radius:2px;background:#4B7BFF;display:none;}
.nb.active .nb-dot{display:block;}

/* ── CARDS ── */
.card{background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:18px;margin-bottom:10px;overflow:hidden;}
.card-pad{padding:14px 16px;}
.row-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.row-item:last-child{border-bottom:none;}
.ri-l{font-size:14px;color:rgba(255,255,255,.55);}
.ri-r{font-size:14px;font-weight:700;}
.sec-lbl{font-size:9px;color:rgba(255,255,255,.22);font-weight:600;letter-spacing:.14em;margin:14px 0 8px 2px;}
.sec-lbl:first-child{margin-top:0;}
/* ── SECTION PANELS (Profile groups) ── */
.sec-panel{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px 14px 16px;margin-bottom:16px;}
.sec-panel-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06);}
.sec-panel-ico{font-size:15px;line-height:1;}
.sec-panel-ttl{font-size:11px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.55);}
.sec-panel-sub{font-size:9px;color:rgba(255,255,255,.28);margin-left:auto;text-align:right;max-width:55%;line-height:1.3;}
.sec-panel.exp{border-left:3px solid rgba(255,107,107,.45);}
.sec-panel.wk{border-left:3px solid rgba(251,146,60,.45);}
.sec-panel.one-exp{border-left:3px solid rgba(255,69,58,.45);}
.sec-panel.fix-inc{border-left:3px solid rgba(52,211,153,.45);}
.sec-panel.one-inc{border-left:3px solid rgba(129,140,248,.45);}

/* ── PULSE RING ── */
.ring-wrap{display:flex;flex-direction:column;background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:22px;margin-bottom:10px;}
.ring-outer{position:relative;width:140px;height:140px;display:flex;align-items:center;justify-content:center;}
.ring-svg{position:absolute;inset:0;transform:rotate(-90deg);}
.r-bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:8;}
.r-track{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:377;}
.ring-center{text-align:center;z-index:1;}
.ring-pct{font-size:32px;font-weight:800;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;}
.ring-sub{font-size:9px;color:rgba(255,255,255,.3);margin-top:3px;letter-spacing:.05em;}
.ring-gross{margin-top:12px;text-align:center;}
.ring-gross-lbl{font-size:9px;color:rgba(255,255,255,.25);font-weight:700;letter-spacing:.1em;margin-bottom:3px;}
.ring-gross-num{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.5px;}
.ring-badge{margin-top:10px;border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;}
.rb-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#F59E0B;}
.rb-ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);color:#34D399;}

/* ── INSIGHT ── */
.insight{background:rgba(255,255,255,.03);border-left:2px solid var(--accent);border-radius:0 12px 12px 0;padding:9px 13px;margin-bottom:10px;}
.ins-txt{font-size:12px;color:rgba(255,255,255,.55);line-height:1.5;}
.ins-b{color:#fff;font-weight:600;}

/* ── TODAY ── */
.today-card{background:rgba(1,204,116,.07);border:1px solid rgba(1,204,116,.15);border-left:3px solid #01CC74;border-radius:18px;padding:14px 16px;margin-bottom:10px;}
.tc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tc-lbl{font-size:9px;font-weight:600;color:rgba(1,204,116,.55);letter-spacing:.1em;}
.tc-badge{font-size:10px;font-weight:600;color:#34D399;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.18);border-radius:7px;padding:3px 8px;}
.tc-num{font-size:36px;font-weight:800;color:#01CC74;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;}
.tc-kc{font-size:18px;color:rgba(52,211,153,.4);}
.tc-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:5px;}
.tc-prog{height:4px;background:rgba(52,211,153,.1);border-radius:2px;overflow:hidden;margin-top:10px;}
.tc-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#34D399,#10B981);}

/* ── SWIPE CARDS ── */
.swipe-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.sw-ttl{font-size:10px;font-weight:700;color:rgba(255,255,255,.2);letter-spacing:.1em;}
.sw-hint{font-size:10px;color:rgba(255,255,255,.1);}
.swipe-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;padding-bottom:2px;}
.swipe-row::-webkit-scrollbar{display:none;}
.sw{flex-shrink:0;width:120px;border-radius:16px;padding:13px 14px;border:1px solid rgba(255,255,255,.07);background:var(--surface);}
.sw-week{background:rgba(251,191,36,.07);}
.sw-hour{background:rgba(99,102,241,.08);}
.sw-tax{background:rgba(139,92,246,.07);}
.swl{font-size:8px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.07em;margin-bottom:5px;}
.swv{font-size:22px;font-weight:800;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;}
.sws{font-size:9px;color:rgba(255,255,255,.2);margin-top:3px;}

/* ── COST BARS ── */
.cst-card{background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:14px 16px;margin-bottom:10px;}
.cst-hdr{display:flex;justify-content:space-between;margin-bottom:12px;}
.cst-ttl{font-size:10px;font-weight:700;color:rgba(255,255,255,.2);letter-spacing:.12em;}
.cst-tot{font-size:12px;font-weight:700;color:#FF453A;}
.cst-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cst-row:last-child{margin-bottom:0;}
.cst-name{font-size:11px;color:rgba(255,255,255,.35);width:80px;flex-shrink:0;}
.cst-bar{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.cst-fill{height:100%;border-radius:2px;}
.cst-val{font-size:11px;font-weight:600;color:#FF6B6B;width:46px;text-align:right;flex-shrink:0;}

/* ── REPORTS TABS ── */
.rep-tabs{display:flex;gap:5px;margin-bottom:12px;background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:4px;}
.rep-tab{flex:1;padding:8px 6px;border-radius:10px;font-size:11px;font-weight:600;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s;}
.rep-tab.on{background:rgba(75,123,255,.12);border:1px solid rgba(75,123,255,.18);color:#4B7BFF;}

/* ── DUAL BAR DAY ROW ── */
.day-row-new{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .1s;}
.day-row-new:last-child{border-bottom:none;}
.day-row-new:active{background:rgba(255,255,255,.03);}
.drn-date{font-size:11px;font-weight:600;color:var(--text-secondary);width:36px;flex-shrink:0;}
.drn-bars{flex:1;display:flex;flex-direction:column;gap:3px;}
.drn-bar-wrap{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;display:flex;gap:1px;}
.drn-bolt{height:100%;background:var(--accent);border-radius:3px 0 0 3px;transition:width .3s;}
.drn-other{height:100%;background:var(--green);transition:width .3s;}
.drn-earn{font-size:11px;font-weight:700;text-align:right;width:46px;flex-shrink:0;color:#01CC74;font-variant-numeric:tabular-nums;}

/* Day expanded panel */
.day-expand{background:var(--surface);margin:0 10px 6px;border-radius:13px;overflow:hidden;border:1px solid rgba(255,255,255,.07);}
.dx-hdr{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:1px solid rgba(255,255,255,.05);}
.dx-date{font-size:10px;font-weight:700;color:var(--text-secondary);}
.dx-total{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.4px;}
.dx-sources{padding:6px 13px;}
.dx-src{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.dx-src:last-child{border-bottom:none;}
.dx-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dx-name{font-size:10px;color:var(--text-secondary);flex:1;margin-left:7px;}
.dx-val{font-size:10px;font-weight:700;}
/* Quick add inside day */
.dx-add{display:flex;gap:5px;padding:7px 13px;background:rgba(255,255,255,.02);border-top:1px solid rgba(255,255,255,.05);}
.dx-inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);border-radius:8px;color:#fff;padding:6px 9px;font-size:11px;font-family:inherit;outline:none;flex:1;}
.dx-add-btn{background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:8px;color:var(--accent);font-size:11px;font-weight:700;padding:6px 11px;cursor:pointer;font-family:inherit;white-space:nowrap;}

/* ── MONTH COMPARISON ── */
.month-comp-card{background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden;margin-bottom:10px;}
.mc-hero{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.05);}
.mc-row{display:flex;gap:10px;margin-bottom:10px;}
.mc-col{flex:1;background:rgba(255,255,255,.04);border-radius:12px;padding:10px 12px;}
.mc-col-lbl{font-size:8px;font-weight:600;color:var(--text-muted);letter-spacing:.1em;margin-bottom:4px;}
.mc-col-val{font-size:16px;font-weight:800;letter-spacing:-.5px;}
.mc-col-diff{font-size:9px;font-weight:600;margin-top:2px;}
.mc-bars{padding:10px 16px;}
.mc-bars-lbl{font-size:8px;font-weight:600;color:var(--text-muted);letter-spacing:.1em;margin-bottom:8px;}
.mc-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.mc-bar-row:last-child{margin-bottom:0;}
.mc-bar-mo{font-size:9px;color:var(--text-secondary);width:28px;flex-shrink:0;}
.mc-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.mc-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.mc-bar-val{font-size:9px;font-weight:700;width:46px;text-align:right;flex-shrink:0;}

/* ── WEEK COMPARISON ── */
.wk-compare{background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden;margin-bottom:10px;}
.wkc-hdr{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;}
.wkc-ttl{font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:.12em;}
.wkc-body{padding:0 16px 14px;}
.wkc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.wkc-row:last-child{border-bottom:none;}
.wkc-lbl{font-size:12px;color:var(--text-secondary);}
.wkc-vals{display:flex;gap:14px;align-items:center;}
.wkc-cur{font-size:12px;font-weight:700;}
.wkc-prev{font-size:10px;color:var(--text-muted);}
.wkc-diff{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;}
.diff-pos{background:rgba(1,204,116,.1);color:#01CC74;}
.diff-neg{background:rgba(255,69,69,.1);color:#FF4545;}

.rep-hero{background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:16px;margin-bottom:10px;}
.rh-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.1em;margin-bottom:6px;}
.rh-num{font-size:34px;font-weight:800;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;}
.rh-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:5px;}
.rh-prog{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:12px;}
.rh-fill{height:100%;border-radius:2px;}
.rh-prow{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;}

.week-card{background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:14px 16px;margin-bottom:10px;}
.wc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.wc-lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.1em;}
.wc-num{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1;}
.wc-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,196,0,.08);}
.wc-row:last-child{border-bottom:none;}
.wc-l{font-size:13px;color:rgba(255,255,255,.45);}
.wc-r{font-size:13px;font-weight:700;}
.wc-prog{height:3px;background:rgba(255,196,0,.1);border-radius:2px;overflow:hidden;margin:10px 0 5px;}
.wc-fill{height:100%;border-radius:2px;}
.wc-meta{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.2);}

.days-card{background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden;margin-bottom:10px;}
.days-ttl{padding:12px 16px 8px;font-size:10px;font-weight:700;color:rgba(255,255,255,.2);letter-spacing:.12em;border-bottom:1px solid rgba(255,255,255,.05);}
.day-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);}
.day-row:last-child{border-bottom:none;}
.day-date{font-size:12px;font-weight:600;color:rgba(255,255,255,.55);width:36px;flex-shrink:0;}
.day-bar{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.day-fill{height:100%;border-radius:2px;}
.day-trips{font-size:10px;color:rgba(255,255,255,.2);width:32px;text-align:center;flex-shrink:0;}
.day-earn{font-size:12px;font-weight:700;text-align:right;width:48px;flex-shrink:0;}

.share-btn{width:100%;padding:15px;background:#111;border:1px solid rgba(255,255,255,.08);border-radius:16px;color:rgba(255,255,255,.5);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.share-btn:active{transform:scale(.98);}

/* ── PROFILE TAB ── */
.usr-card{display:flex;align-items:center;gap:14px;background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:16px;margin-bottom:14px;}
.usr-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#4B7BFF,#01CC74);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;}
.usr-name{font-size:16px;font-weight:700;}
.usr-role{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;}

.lang-row{display:flex;gap:8px;margin-bottom:14px;}
.lang-pill{flex:1;padding:11px 6px;border-radius:12px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);text-align:center;}
.lang-pill.on{background:rgba(255,196,0,.1);border-color:rgba(255,196,0,.3);color:#FFC400;}
.lang-flag{font-size:18px;display:block;margin-bottom:3px;}

.st-group{background:rgba(8,14,17,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;margin-bottom:14px;}
.st-card{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-left:3px solid rgba(160,170,185,.4);border-radius:12px;margin-bottom:8px;}
.st-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.05);}
.st-row:last-child{border-bottom:none;}
.st-lbl{font-size:14px;color:rgba(255,255,255,.7);}
.st-hint{font-size:10px;color:rgba(255,255,255,.25);margin-top:2px;}

  return [mon.toISOString().slice(0,10), sun.toISOString().slice(0,10)];
}
function toPragueDate(ts){
  const d=new Date((ts+7200)*1000);
  return d.toISOString().slice(0,10);
}
function daysLeftInMonth(){
  const n=new Date(); const last=new Date(n.getFullYear(),n.getMonth()+1,0).getDate();
  return Math.max(1, last-n.getDate()+1);
}
// ── SAVE: localStorage + cloud sync ──
let _saveTimer = null;
function save(){
  localStorage.setItem('ds3', JSON.stringify(state));
  // Debounce cloud save — 2 seconds after last change
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveToCloud, 2000);
}
async function saveToCloud(){
  const session = await _sb.auth.getSession();
  if(!session?.data?.session) return;
  const uid = session.data.session.user.id;
  const stateToSave = JSON.parse(JSON.stringify(state));
  delete stateToSave.user; delete stateToSave.role;
  await _sb.from('user_state').upsert({id: uid, state: stateToSave, updated_at: new Date().toISOString()});
}
async function loadFromCloud(){
  const session = await _sb.auth.getSession();
  if(!session?.data?.session) return false;
  const uid = session.data.session.user.id;
  const {data} = await _sb.from('user_state').select('state').eq('id', uid).single();
  if(data?.state && Object.keys(data.state).length > 0){
    const p = data.state;
    state = {...state, ...p};
    migrateState(p);
    return true;
  }
  return false;
}
function migrateState(p){
  if(p.otherIncome&&p.otherIncome.length>0&&(!p.oneTimeIncome||p.oneTimeIncome.length===0)){
    state.oneTimeIncome=p.otherIncome;
  }
  if(state.settings){
    if(state.settings.fuelConsumption!=null && state.settings.fuelCons==null){
      state.settings.fuelCons=state.settings.fuelConsumption;
    }
    if(state.settings.amortPerKm!=null && state.settings.amort==null){
      state.settings.amort=state.settings.amortPerKm;
    }
    delete state.settings.fuelConsumption;
    delete state.settings.amortPerKm;
  }
  _dedupeCorrections();
}
function load(){
  try{
    const s=localStorage.getItem('ds3');
    if(s){
      const p=JSON.parse(s);
      state={...state,...p};
      migrateState(p);
    }
  }catch(e){}
}

// Keep at most ONE balance correction across ALL dates in each list (the most recent by id).
function _dedupeCorrections(){
  ['oneTimeIncome','oneTimeExpenses'].forEach(key=>{
    const arr=state[key]; if(!Array.isArray(arr))return;
    const corrs=arr.filter(e=>e&&e.name==='Корекція балансу');
    const others=arr.filter(e=>!e||e.name!=='Корекція балансу');
    if(corrs.length>1){
      corrs.sort((a,b)=>Number(b.id||0)-Number(a.id||0));
      state[key]=[...others, corrs[0]];
    }
  });
}
function isAdmin(){ return state.role==='admin'; }

function ordersForMonth(mo){
  return state.boltData.orders.filter(o=>{
    if(o.order_status!=='finished') return false;
    const ts=o.order_finished_timestamp||o.order_created_timestamp;
    return ts && toPragueDate(ts).slice(0,7)===mo;
  });
}
function ordersForWeek(from,to){
  return state.boltData.orders.filter(o=>{
    if(o.order_status!=='finished') return false;
    const ts=o.order_finished_timestamp||o.order_created_timestamp;
    if(!ts) return false;
    const d=toPragueDate(ts);
    return d>=from && d<=to;
  });
}
function ordersForDay(day){
  return state.boltData.orders.filter(o=>{
    if(o.order_status!=='finished') return false;
    const ts=o.order_finished_timestamp||o.order_created_timestamp;
    return ts && toPragueDate(ts)===day;
  });
}

function calcUpcoming(){
  const now=new Date();
  const dayNow=now.getDate();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const s=state.settings;

  const byDay={};
  (state.monthlyFixedCosts||[]).forEach(c=>{
    const d=c.dueDay||1;
    if(!byDay[d]) byDay[d]=[];
    byDay[d].push(c);
  });
  if(Object.keys(byDay).length===0) return [];

  // Current actual balance
  const rd=calcRingData();

  // Forecast daily rate based on mode
  const mode=s.forecastMode||'avg';
  let dailyRate=0;
  if(mode==='avg')  dailyRate = dayNow>0 ? rd.grossActual/dayNow : 0;
  if(mode==='goal') dailyRate = s.dailyGoal||0;

  // Sort due dates by days until
  const dueDays=Object.keys(byDay).map(Number).sort((a,b)=>a-b).map(d=>{
    let daysUntil=d-dayNow;
    if(daysUntil<0) daysUntil=daysInMonth-dayNow+d;
    return {d, daysUntil};
  }).sort((a,b)=>a.daysUntil-b.daysUntil);

  // Start from NETTO balance: actual earnings minus variable costs (fuel + amort)
  // Also subtract already-paid expenses this month AND one-time expenses already incurred (date <= today)
  const m=calcMonth();
  const paidTotal=(state.paidExpenses||[])
    .filter(p=>p.month===todayMonth())
    .reduce((s,p)=>s+p.amount,0);
  const oneTimeExpSoFar=(state.oneTimeExpenses||[])
    .filter(e=>e.date && e.date<=today() && e.date.startsWith(todayMonth()))
    .reduce((a,e)=>a+e.amount,0);
  const nettoBalance=rd.grossActual-m.vc.total-oneTimeExpSoFar;
  const rollover2=state.settings.rolloverEnabled?(state.rolloverBalance||0):0;
  let runningBalance=nettoBalance+rollover2-paidTotal;
  let prevDaysUntil=0; // track previous card's daysUntil for delta calculation
  const upcoming=[];

  dueDays.forEach(({d, daysUntil})=>{
    const total=byDay[d].reduce((s,c)=>s+c.amount,0);
    const prevD=upcoming.length>0 ? upcoming[upcoming.length-1].dueDay : dayNow;

    // Recurring income arriving in this window (handle month wrap)
    const monthWrapped = d < prevD;
    const recurringForPeriod=(state.recurringIncome||[])
      .filter(e=>{
        const ed=e.dueDay||1;
        if(monthWrapped) return ed>prevD || ed<=d;  // wraps around month end
        return ed>prevD && ed<=d;
      })
      .reduce((a,e)=>a+e.amount,0);

    // One-time income arriving in this window
    const prevDateStr=upcoming.length>0
      ? `${todayMonth()}-${String(upcoming[upcoming.length-1].dueDay).padStart(2,'0')}`
      : today();
    const dueDateStr=`${todayMonth()}-${String(d).padStart(2,'0')}`;
    const oneTimeForPeriod=(state.oneTimeIncome||[])
      .filter(e=>e.date>prevDateStr && e.date<=dueDateStr)
      .reduce((a,e)=>a+e.amount,0);

    // One-time expenses arriving in this window (future-dated, not yet incurred today)
    const oneTimeExpForPeriod=(state.oneTimeExpenses||[])
      .filter(e=>e.date>prevDateStr && e.date<=dueDateStr)
      .reduce((a,e)=>a+e.amount,0);

    // Forecast: only days BETWEEN previous due date and this one (not from today)
    const daysBetween = daysUntil - prevDaysUntil;
    const forecastEarnings=mode!=='none' ? Math.round(dailyRate*daysBetween) : 0;

    const availableAtDueDate=runningBalance+recurringForPeriod+oneTimeForPeriod-oneTimeExpForPeriod+forecastEarnings;
    const diff=availableAtDueDate-total;

    upcoming.push({
      dueDay:d, daysUntil, costs:byDay[d], total,
      available:availableAtDueDate, diff,
      recurringForPeriod, oneTimeForPeriod, oneTimeExpForPeriod, forecastEarnings,
      daysBetween,
      balanceBefore:Math.round(runningBalance),
    });

    // Cascade: subtract this payment from running balance
    runningBalance=availableAtDueDate-total;
    prevDaysUntil=daysUntil; // update for next iteration
  });

  return upcoming;
}

function renderAlertCard(){
  const upcoming=calcUpcoming();
  if(upcoming.length===0) return '';
  const forecastMode=state.settings.forecastMode||'avg';
  const forecastOn=forecastMode!=='none';
  const forecastLbl=forecastMode==='goal'?'По цілі':'По середньому';

  const allPaid=upcoming.length>0&&upcoming.every(u=>isPaid(u.dueDay));
  if(allPaid){
    const paidList=(state.paidExpenses||[]).filter(p=>p.month===todayMonth()).sort((a,b)=>a.dueDay-b.dueDay);
    return `<div class="all-paid-box">
      <div style="font-size:22px;margin-bottom:5px;">🎉</div>
      <div style="font-size:13px;font-weight:700;color:#34D399;margin-bottom:3px;">Всі витрати оплачено!</div>
      <div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:8px;">${todayMonth()} · всі платежі підтверджені</div>
      ${paidList.map(p=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(52,211,153,.07);font-size:9px;"><span style="color:rgba(255,255,255,.4);">✅ ${p.names}</span><span style="font-weight:700;color:rgba(52,211,153,.6);">-${fmt(p.amount)} Kč</span></div>`).join('')}
    </div>`;
  }

  return (()=>{
    const moNames={'01':'Січень','02':'Лютий','03':'Березень','04':'Квітень','05':'Травень','06':'Червень','07':'Липень','08':'Серпень','09':'Вересень','10':'Жовтень','11':'Листопад','12':'Грудень'};
    const curMo=todayMonth();
    const nextMoDate=new Date(); nextMoDate.setMonth(nextMoDate.getMonth()+1);
    const nextMoStr=nextMoDate.toISOString().slice(0,7);
    const dayNow=new Date().getDate();
    // A bill belongs to THIS month if its due day hasn't passed yet (dueDay >= today).
    // If dueDay < today, it already passed this month → it's next month's occurrence.
    const thisMonthCards=upcoming.filter(u=>u.dueDay>=dayNow);
    const nextMonthCards=upcoming.filter(u=>u.dueDay<dayNow);

    const renderCard=(u)=>{
      const paid=isPaid(u.dueDay);
      if(paid){
        const pd=(state.paidExpenses||[]).find(p=>p.dueDay===u.dueDay&&p.month===todayMonth());
        return `<div class="ac-paid">
          <div class="ac-paid-row">
            <div class="ac-paid-ico">✅</div>
            <div class="ac-paid-body">
              <div class="ac-paid-name">${pd?.names||u.costs.map(c=>c.name).join(', ')} · ${u.dueDay}-го</div>
              <div class="ac-paid-date">${t('paidStatus')} ${pd?.paidDate||today()}</div>
            </div>
            <div style="text-align:right;">
              <div class="ac-paid-amt">-${fmt(u.total)} Kč</div>
              <div class="ac-paid-tag">${t('paidStatus')}</div>
            </div>
            <button onclick="unpay(${u.dueDay})" title="Скасувати" style="background:none;border:none;color:rgba(255,255,255,.2);font-size:14px;cursor:pointer;margin-left:6px;flex-shrink:0;">↩</button>
          </div>
        </div>`;
      }
      const isOk=u.diff>=0;
      const isWarn=isOk&&u.diff<u.total*0.15;
      const collapsed=_collapsedAlerts.has(u.dueDay);
      const cls=isOk?(isWarn?'ac-warn':'ac-ok'):'ac-danger';
      const lbl=isOk?(isWarn?t('soonLbl'):'✅ '+t('paidLbl')):t('notEnough');
      const lblCol=isOk?(isWarn?'rgba(245,158,11,.7)':'rgba(52,211,153,.7)'):'rgba(255,69,58,.7)';
      const pillCol=isOk?(isWarn?'rgba(245,158,11,.15)':'rgba(52,211,153,.1)'):'rgba(255,69,58,.15)';
      const pillBrd=isOk?(isWarn?'rgba(245,158,11,.3)':'rgba(52,211,153,.25)'):'rgba(255,69,58,.3)';
      const pillTxt=isOk?(isWarn?'#F59E0B':'#34D399'):'#FF453A';
      const dayWord=u.daysUntil===0?'Сьогодні!':u.daysUntil===1?'Завтра':`${u.daysUntil} дн.`;
      // Formula: (billAmount - cash on hand now) / days until
      // This tells you exactly how much to earn per day from TODAY to cover this bill
      const currentCash=calcRingData().netActual;

      <div style="display:flex;align-items:center;gap:7px;margin:${dim?'12px':'4px'} 0 6px;">

    const curMoName=moNames[curMo.slice(5)]||curMo.slice(5);

    let html='';
    if(thisMonthCards.length>0){

    return html;

function calcPrevWeek(){
  const [from,to]=getWeekRange();
  const prevFrom=new Date(from); prevFrom.setDate(prevFrom.getDate()-7);
  const prevTo=new Date(to); prevTo.setDate(prevTo.getDate()-7);
  const pf=prevFrom.toISOString().slice(0,10);
  const pt=prevTo.toISOString().slice(0,10);
  const orders=ordersForWeek(pf,pt);
  const boltGross=orders.reduce((a,o)=>a+(o.order_price?.net_earnings||0),0);
  const km=orders.reduce((a,o)=>a+(o.ride_distance||0),0)/1000;
  const vc=calcVarCosts(km);
  const weeklyFixed=(state.weeklyFixedCosts||[]).reduce((a,c)=>a+c.amount,0);
  return {boltGross,km,trips:orders.length,net:boltGross-vc.total-weeklyFixed,vc};
}

// ── AUTO ARCHIVE ──
function checkArchive(){
  const currentMo=todayMonth();
  if(!state.monthlyArchive) state.monthlyArchive={};
  const prevInc=(state.oneTimeIncome||[]).filter(e=>e.date&&e.date.slice(0,7)<currentMo);
  const prevExp=(state.oneTimeExpenses||[]).filter(e=>e.date&&e.date.slice(0,7)<currentMo);
  if(prevInc.length===0&&prevExp.length===0) return;
  const months=new Set([...prevInc.map(e=>e.date.slice(0,7)),...prevExp.map(e=>e.date.slice(0,7))]);
  months.forEach(mo=>{
    if(state.monthlyArchive[mo]) return;
    const mc=calcMonth(mo);
    state.monthlyArchive[mo]={mo,net:mc.net,gross:mc.gross,boltGross:mc.boltGross,
      trips:mc.trips,km:Math.round(mc.km),totalCosts:mc.totalCosts};
  });
  state.oneTimeIncome=(state.oneTimeIncome||[]).filter(e=>!e.date||e.date.slice(0,7)>=currentMo);
  state.oneTimeExpenses=(state.oneTimeExpenses||[]).filter(e=>!e.date||e.date.slice(0,7)>=currentMo);
  state.odometerLog=(state.odometerLog||[]).filter(e=>!e.date||e.date.slice(0,7)>=currentMo);
  save();
}

function getOdometerKmForPeriod(from, to){
  const log=(state.odometerLog||[]).filter(e=>e.km>0).slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(log.length===0) return 0;
  const base=state.settings.odometerBase||0;
  // Last entry in or before period end
  const upTo=log.filter(e=>e.date<=to);
  if(upTo.length===0) return 0;
  const latest=upTo[upTo.length-1];
  // First entry in or after period start (or base point)
  const fromEntry=log.filter(e=>e.date>=from&&e.date<=to);
  const before=log.filter(e=>e.date<from).pop();
  const startKm=before?before.km:(base||latest.km);
  return Math.max(0, latest.km - startKm);
}
function getOdometerKmForDay(day){
  const log=(state.odometerLog||[]).filter(e=>e.km>0).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const idx=log.findIndex(e=>e.date===day);
  if(idx<0) return 0;
  const base=state.settings.odometerBase||0;
  const prev=idx>0?log[idx-1].km:base;
  if(!prev) return 0;
  return Math.max(0, log[idx].km - prev);
}
function getOdometerKmForMonth(mo){
  const log=(state.odometerLog||[]).filter(e=>e.km>0).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const base=state.settings.odometerBase||0;
  // Last entry of this month
  const inMo=log.filter(e=>e.date.startsWith(mo));
  if(inMo.length===0) return 0;
  const latest=inMo[inMo.length-1];
  // Starting point: last entry before this month, or odometerBase
  const before=log.filter(e=>e.date<mo+'-01').pop();
  const startKm=before?before.km:base;
  if(!startKm) return 0;
  return Math.max(0, latest.km - startKm);
}

function calcVarCosts(km){
  const s=state.settings;
  // Fuel only counts if consumption is actually set. No phantom defaults.
  const fuel = (s.fuelEnabled && s.fuelCons>0) ? (km/100)*s.fuelCons*s.fuelPrice : 0;
  const amort = (s.amort>0) ? km*s.amort : 0;
  return {fuel, amort, total:fuel+amort};
}

// Get km for a period based on current mode
function getKm(mode, ...args){
  const s=state.settings;
  if(s.boltKmEnabled){
    // km already calculated from orders — passed in directly
    return args[0]||0;
  } else {
    if(mode==='day')   return getOdometerKmForDay(args[0]);
    if(mode==='week')  return getOdometerKmForPeriod(args[0],args[1]);
    if(mode==='month') return getOdometerKmForMonth(args[0]);
    return 0;
  }
}

function calcMonth(mo){
  mo=mo||todayMonth(); const s=state.settings;
  const orders=ordersForMonth(mo);
  const boltGross=orders.reduce((a,o)=>a+(o.order_price?.net_earnings||0),0);
  const boltKm=orders.reduce((a,o)=>a+(o.ride_distance||0),0)/1000;
  const km=s.boltKmEnabled ? boltKm : getOdometerKmForMonth(mo);
  const vc=calcVarCosts(km);

  const recurringInc=(state.recurringIncome||[]).reduce((a,e)=>a+e.amount,0);
  const oneTimeInc=(state.oneTimeIncome||[]).filter(e=>e.date?.startsWith(mo)).reduce((a,e)=>a+e.amount,0);
  const oneTimeExp=(state.oneTimeExpenses||[]).filter(e=>e.date?.startsWith(mo)).reduce((a,e)=>a+e.amount,0);

  // Rollover: add previous month balance if enabled and this is current month
  const rollover=(s.rolloverEnabled && mo===todayMonth()) ? (state.rolloverBalance||0) : 0;
  const gross=boltGross+recurringInc+oneTimeInc+rollover;

  const fixedMonthly=(state.monthlyFixedCosts||[]).reduce((a,c)=>a+c.amount,0);
  const weeksInMonth=4.33;
  const fixedWeekly=(state.weeklyFixedCosts||[]).reduce((a,c)=>a+c.amount,0)*weeksInMonth;
  const dph=s.dphEnabled ? boltGross*(s.boltCommission/100)*0.21 : 0;
  const totalFixed=fixedMonthly+fixedWeekly+dph;
  const totalVar=vc.total+oneTimeExp;
  const totalCosts=totalFixed+totalVar;

  const netBeforeTax=gross-totalCosts;
  const incomeTax=s.incomeTaxEnabled&&netBeforeTax>0 ? netBeforeTax*(s.incomeTaxRate/100) : 0;
  const net=netBeforeTax-incomeTax;
  const pct=totalCosts>0 ? (gross/totalCosts)*100 : 0;

  const activeMin=orders.reduce((a,o)=>{
    const s2=o.order_created_timestamp||0, e2=o.order_finished_timestamp||0;
    return a+(e2>s2?(e2-s2)/60:0);
  },0);
  const activeHours=activeMin/60;
  const dailyTarget=Math.round(Math.max(0,totalFixed-gross+totalVar)/daysLeftInMonth());

  return {gross,boltGross,recurringInc,oneTimeInc,oneTimeExp,rollover,km,boltKm,vc,
    fixedMonthly,fixedWeekly,dph,totalFixed,totalVar,totalCosts,
    incomeTax,net,pct,activeHours,dailyTarget,trips:orders.length,mo};
}

// ── ROLLOVER CHECK — call on app start ──
function checkRollover(){
  const now=new Date();
  const currentMo=todayMonth();
  const lastClosed=state.lastClosedMonth;
  if(!state.settings.rolloverEnabled) return;
  if(lastClosed===currentMo) return;

  // Calculate previous month net
  const prevMo=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,7);
  if(lastClosed===prevMo) return; // already done

  const prevCalc=calcMonth(prevMo);
  if(prevCalc.net>0){
    state.rolloverBalance=prevCalc.net;
  } else {
    state.rolloverBalance=0;
  }
  state.lastClosedMonth=prevMo;
  save();
}

function calcWeek(){
  const [from,to]=getWeekRange();
  const orders=ordersForWeek(from,to);
  const boltGross=orders.reduce((a,o)=>a+(o.order_price?.net_earnings||0),0);
  const boltKm=orders.reduce((a,o)=>a+(o.ride_distance||0),0)/1000;
  const s=state.settings;
  const km=s.boltKmEnabled ? boltKm : getOdometerKmForPeriod(from,to);
  const vc=calcVarCosts(km);
  const oneTimeInc=(state.oneTimeIncome||[]).filter(e=>e.date>=from&&e.date<=to).reduce((a,e)=>a+e.amount,0);
  const weeklyFixed=(state.weeklyFixedCosts||[]).reduce((a,c)=>a+c.amount,0);
  const gross=boltGross+oneTimeInc;
  const netVarOnly=gross-vc.total;
  const netFull=gross-vc.total-weeklyFixed;
  const pct=weeklyFixed>0 ? Math.min(100,(gross-vc.total)/weeklyFixed*100) : 100;
  return {gross,boltGross,oneTimeInc,km,vc,weeklyFixed,netVarOnly,netFull,pct,trips:orders.length,from,to};
}

function calcToday(){
  const d=today(); const s=state.settings;
  const orders=ordersForDay(d);
  const boltGross=orders.reduce((a,o)=>a+(o.order_price?.net_earnings||0),0);
  const boltKm=orders.reduce((a,o)=>a+(o.ride_distance||0),0)/1000;
  const km=s.boltKmEnabled ? boltKm : getOdometerKmForDay(d);
  const vc=calcVarCosts(km);
  // Exclude "Корекція балансу" from daily goal — only count real income
  const oneTimeInc=(state.oneTimeIncome||[]).filter(e=>e.date===d&&e.name!=='Корекція балансу').reduce((a,e)=>a+e.amount,0);
  const exp=(state.oneTimeExpenses||[]).filter(e=>e.date===d&&e.name!=='Корекція балансу').reduce((a,e)=>a+e.amount,0);
  const net=boltGross+oneTimeInc-vc.total-exp;
  const pct=s.dailyGoal>0?Math.max(0,Math.min(100,(net/s.dailyGoal)*100)):0;
  return {boltGross,oneTimeInc,km,vc,exp,net,pct,trips:orders.length,goal:s.dailyGoal};
}

// ── ACTUAL vs PROJECTED ──
function calcRingData(){
  const mo=todayMonth(); const s=state.settings;
  const now=new Date(); const dayNow=now.getDate();
  const orders=ordersForMonth(mo);
  const boltGross=orders.reduce((a,o)=>a+(o.order_price?.net_earnings||0),0);
  const km=s.boltKmEnabled ? orders.reduce((a,o)=>a+(o.ride_distance||0),0)/1000 : getOdometerKmForMonth(mo);
  const vc=calcVarCosts(km);
  const oneTimeExp=(state.oneTimeExpenses||[]).filter(e=>e.date?.startsWith(mo)).reduce((a,e)=>a+e.amount,0);
  const fixedMonthly=(state.monthlyFixedCosts||[]).reduce((a,c)=>a+c.amount,0);
  const fixedWeekly=(state.weeklyFixedCosts||[]).reduce((a,c)=>a+c.amount,0)*4.33;
  const totalFixed=fixedMonthly+fixedWeekly;

  // ACTUAL: only income that has physically arrived by today
  const recurringActual=(state.recurringIncome||[])
    .filter(e=>(e.dueDay||1)<=dayNow)
    .reduce((a,e)=>a+e.amount,0);
  const oneTimeActual=(state.oneTimeIncome||[])
    .filter(e=>e.date<=today())
    .reduce((a,e)=>a+e.amount,0);
  const rollover=(s.rolloverEnabled?(state.rolloverBalance||0):0);
  const grossActual=boltGross+recurringActual+oneTimeActual+rollover;
  const totalCostsForPct=totalFixed+vc.total+oneTimeExp;

  // ФАКТ МІСЯЦЯ = Netto (gross - variable costs) vs total costs
  // Exclude "Корекція балансу" — Netto must stay a clean fact (real income only)
  const corrIncForNetto=(state.oneTimeIncome||[])
    .filter(e=>e.name==='Корекція балансу'&&e.date<=today())
    .reduce((a,e)=>a+e.amount,0);
  const nettoMonth=grossActual-corrIncForNetto-vc.total;
  const pctActual=totalCostsForPct>0 ? Math.min(200,(nettoMonth/totalCostsForPct)*100) : 0;

  // Coverage: how much of fixed bills already paid
  const paidThisMonth=(state.paidExpenses||[])
    .filter(p=>p.month===mo)
    .reduce((s,p)=>s+p.amount,0);
  const pctCoverage=totalFixed>0 ? Math.min(100,(paidThisMonth/totalFixed)*100) : 0;

  // PROJECTED: all planned income this month
  const recurringAll=(state.recurringIncome||[]).reduce((a,e)=>a+e.amount,0);
  const oneTimeAll=(state.oneTimeIncome||[])
    .filter(e=>e.date?.startsWith(mo))
    .reduce((a,e)=>a+e.amount,0);
  const grossProjected=boltGross+recurringAll+oneTimeAll+rollover;
  const pctProjected=totalCostsForPct>0 ? Math.min(200,(grossProjected/totalCostsForPct)*100) : 0;

  // MONEY ON HAND = earned - variable costs - one-time expenses - already PAID fixed bills
  const moneyOnHand=grossActual-vc.total-oneTimeExp-paidThisMonth;

  // Sum of balance-corrections this month (income side +, expense side -)
  const corrIncome=(state.oneTimeIncome||[])
    .filter(e=>e.name==='Корекція балансу'&&e.date?.startsWith(mo)&&e.date<=today())
    .reduce((a,e)=>a+e.amount,0);
  const corrExpense=(state.oneTimeExpenses||[])
    .filter(e=>e.name==='Корекція балансу'&&e.date?.startsWith(mo))
    .reduce((a,e)=>a+e.amount,0);
  // RAW money on hand = what the math says you have, BEFORE any manual correction.
  // diff in saveManualBalance is computed against this, so repeated edits never stack.
  const moneyOnHandRaw=moneyOnHand-corrIncome+corrExpense;

  return {pctActual, pctProjected, grossActual, grossProjected, totalFixed,
    totalCostsForPct, paidThisMonth, pctCoverage, nettoMonth,
    netActual:moneyOnHand,
    netActualRaw:moneyOnHandRaw,
    nettoActual:Math.max(0,grossActual-vc.total)};
}

// ── RENDER REPORTS ──
function renderReports(){
  try{
  const m=calcMonth(); const w=calcWeek();

  // Days grouped
  const byDay={};
  state.boltData.orders.filter(o=>o.order_status==='finished').forEach(o=>{
    const ts=o.order_finished_timestamp||o.order_created_timestamp; if(!ts) return;
    const d=toPragueDate(ts);
    if(!byDay[d]) byDay[d]={bolt:0,other:0,km:0,trips:0,expenses:0};
    byDay[d].bolt+=(o.order_price?.net_earnings||0);
    byDay[d].km+=(o.ride_distance||0)/1000;
    byDay[d].trips++;
  });
  (state.oneTimeIncome||[]).forEach(e=>{
    if(!e.date) return;
    if(!byDay[e.date]) byDay[e.date]={bolt:0,other:0,correction:0,km:0,trips:0,expenses:0};
    if(e.name==='Корекція балансу') byDay[e.date].correction=(byDay[e.date].correction||0)+e.amount;
    else byDay[e.date].other+=e.amount;
  });
  // Also include oneTimeExpenses days so they appear in history
  (state.oneTimeExpenses||[]).forEach(e=>{
    if(!e.date) return;
    if(!byDay[e.date]) byDay[e.date]={bolt:0,other:0,correction:0,km:0,trips:0,expenses:0};
    if(e.name==='Корекція балансу') byDay[e.date].correction=(byDay[e.date].correction||0)-e.amount;
    else byDay[e.date].expenses=(byDay[e.date].expenses||0)+e.amount;
  });

function renderRepMonths(m,pct,progColor,histHTML,years,byYear,monthNames){
  const last6=[];
  for(let i=0;i<6;i++){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    last6.push(d.toISOString().slice(0,7));
  }
  const last6Data=last6.map(mo=>({mo,calc:calcMonth(mo)}));
  const maxNet=Math.max(...last6Data.map(x=>Math.abs(x.calc.net)),1);
  const prevCalc=last6Data[1]?.calc;
  const diff=m.net-(prevCalc?.net||0);
  const diffPct=prevCalc?.net?Math.round((diff/Math.abs(prevCalc.net))*100):0;
  const moNames={'01':'Січ','02':'Лют','03':'Бер','04':'Кві','05':'Тра','06':'Чер','07':'Лип','08':'Сер','09':'Вер','10':'Жов','11':'Лис','12':'Гру'};

  // ── BUILD DAY-BY-DAY CHART DATA (correct logic) ──
  const chartMo=_chartMonth||todayMonth();
  const [cy,cm]=chartMo.split('-').map(Number);
  const daysInMo=new Date(cy,cm,0).getDate();
  const todayD=today();
  const isCurrentMo=(chartMo===todayMonth());
  const todayDayNum=isCurrentMo?new Date().getDate():0;

  // ── Daily target from SETTINGS (not calcMonth!) ──
  const dailyTarget=state.settings?.dailyGoal||1500;

  // ── Bolt earnings + km per day ──
  const boltByDay={};
  (state.boltData?.orders||[]).filter(o=>o.order_status==='finished').forEach(o=>{
    const ts=o.order_finished_timestamp||o.order_created_timestamp; if(!ts)return;
    const d=toPragueDate(ts);
    if(!d.startsWith(chartMo))return;
    if(!boltByDay[d])boltByDay[d]={earnings:0,km:0};
    boltByDay[d].earnings+=(o.order_price?.net_earnings||0);
    boltByDay[d].km+=(o.ride_distance||0)/1000;
  });

  // ── One-time income per day ──
  const incByDate={};
  (state.oneTimeIncome||[]).filter(e=>e.date?.startsWith(chartMo)).forEach(e=>{
    incByDate[e.date]=(incByDate[e.date]||0)+e.amount;
  });

  // ── One-time expenses per day (including manual corrections) ──
  const expByDate={};
  (state.oneTimeExpenses||[]).filter(e=>e.date?.startsWith(chartMo)).forEach(e=>{
    expByDate[e.date]=(expByDate[e.date]||0)+e.amount;
  });

  // ── Paid bills by their paidDate (card payments reduce balance on that day) ──
  const paidByDate={};
  (state.paidExpenses||[]).filter(p=>p.month===chartMo).forEach(p=>{
    const pd=p.paidDate||'';
    if(pd)paidByDate[pd]=(paidByDate[pd]||0)+p.amount;
  });

  // ── Build GREEN LINE: cumulative "money on hand" each day ──
  const rollover=(state.settings?.rolloverEnabled?(state.rolloverBalance||0):0);
  const cumActual=[];
  let runAct=rollover;
  for(let d=1;d<=daysInMo;d++){
    const ds=`${chartMo}-${String(d).padStart(2,'0')}`;
    const bolt=boltByDay[ds]||{earnings:0,km:0};
    const useOdometer=state.settings?.boltKmEnabled===false;
    const kmForDay=useOdometer?getOdometerKmForDay(ds):bolt.km;
    const vc=calcVarCosts(kmForDay);
    const inc=incByDate[ds]||0;
    const exp=expByDate[ds]||0;
    const paid=paidByDate[ds]||0;
    runAct+=bolt.earnings+inc-exp-vc.total-paid;
    const hasData=ds<=todayD;
    cumActual.push({d,ds,cum:runAct,hasData,
      hasIncome:bolt.earnings>0||inc>0,
      hasExpense:exp>0||paid>0});
  }

  // ── Future expenses (upcoming unpaid bills) on their due day ──
  const expensesOnDay={};
  calcUpcoming().filter(u=>!isPaid(u.dueDay)).forEach(u=>{
    if(u.dueDay)expensesOnDay[u.dueDay]=(expensesOnDay[u.dueDay]||0)+u.total;
  });

  // ── Future income: recurring income on their dueDay ──
  const incomeOnDay={};
  (state.recurringIncome||[]).forEach(r=>{
    if(r.dueDay)incomeOnDay[r.dueDay]=(incomeOnDay[r.dueDay]||0)+(r.amount||0);
  });
  // Also future one-time income for this month
  (state.oneTimeIncome||[]).filter(e=>e.date?.startsWith(chartMo)).forEach(e=>{
    const d=parseInt(e.date?.slice(8));
    if(d&&d>todayDayNum)incomeOnDay[d]=(incomeOnDay[d]||0)+e.amount;
  });

  // ── Starting balance for this month ──
  // Past/current: rollover setting
  // Future months: projected end of PREVIOUS month
  let chartStartBalance=rollover;
  if(!isCurrentMo){
    // Walk back from current month to chartMo, accumulating projections
    const curMo=todayMonth();
    const [curY,curM]=curMo.split('-').map(Number);
    const [tgY,tgM]=chartMo.split('-').map(Number);
    const monthDiff=(tgY-curY)*12+(tgM-curM);
    if(monthDiff>0){
      // Compute projected ending balance for current month
      const curDaysInMo=new Date(curY,curM,0).getDate();
      const curTodayD=new Date().getDate();
      // Today's actual balance
      let runBalance=0;
      const curRd=calcRingData();
      runBalance=curRd.netActual;
      // Project remaining days of current month
      const curUpcoming=calcUpcoming().filter(u=>!isPaid(u.dueDay));
      const curExpDay={};
      curUpcoming.forEach(u=>{if(u.dueDay>curTodayD)curExpDay[u.dueDay]=(curExpDay[u.dueDay]||0)+u.total;});
      const curIncDay={};
      (state.recurringIncome||[]).forEach(r=>{if(r.dueDay>curTodayD)curIncDay[r.dueDay]=(curIncDay[r.dueDay]||0)+(r.amount||0);});
      for(let d=curTodayD+1;d<=curDaysInMo;d++){
        runBalance+=dailyTarget+(curIncDay[d]||0)-(curExpDay[d]||0);
      }
      // For each subsequent month up to target
      for(let mi=1;mi<monthDiff;mi++){
        const mD=new Date(curY,curM-1+mi,1);
        const mY=mD.getFullYear(),mMo=mD.getMonth()+1;
        const mDays=new Date(mY,mMo,0).getDate();
        const mStr=`${mY}-${String(mMo).padStart(2,'0')}`;
        const mIncDay={};
        (state.recurringIncome||[]).forEach(r=>{if(r.dueDay)mIncDay[r.dueDay]=(mIncDay[r.dueDay]||0)+(r.amount||0);});
        const mExpDay={};
        (state.monthlyFixedCosts||[]).forEach(c=>{if(c.day)mExpDay[c.day]=(mExpDay[c.day]||0)+c.amount;});
        (state.weeklyFixedCosts||[]).forEach(c=>{
          for(let w=1;w<=4;w++){const d=Math.min(c.day+(w-1)*7,mDays);mExpDay[d]=(mExpDay[d]||0)+c.amount;}
        });
        for(let d=1;d<=mDays;d++){
          runBalance+=dailyTarget+(mIncDay[d]||0)-(mExpDay[d]||0);
        }
      }
      chartStartBalance=Math.round(runBalance);
    }
  }
  // Start from today's actual balance
  const todayActual=cumActual.find(x=>x.d===todayDayNum);
  let runProj=isCurrentMo?(todayActual?.cum??runAct):chartStartBalance;
  const cumProj=[];
  for(let d=1;d<=daysInMo;d++){
    if(d<=todayDayNum&&isCurrentMo){cumProj.push(null);continue;}
    runProj+=dailyTarget+(incomeOnDay[d]||0)-(expensesOnDay[d]||0);
    cumProj.push(runProj);
  }

  // ── Chart dimensions ──
  const zoom=_chartZoom||1;
  const DAY_W=zoom>=2?20:9.5;
  const totalW=Math.round(daysInMo*DAY_W+40);
  const H=130; const YPAD=10; const XPAD=36;
  const allVals=[...cumActual.filter(x=>x.hasData).map(x=>x.cum),...cumProj.filter(x=>x!==null),0];
  const maxVal=Math.max(...allVals)+5000;
  const minVal=Math.min(...allVals)-2000;
  const yRange=Math.max(maxVal-minVal,1);
  const toY=v=>H-YPAD-((v-minVal)/yRange)*(H-YPAD*2);
  const toX=d=>XPAD+(d-1)*DAY_W+DAY_W/2;

  // ── Y axis labels ──
  const ySteps=4;
  const yLabels=[];
  for(let i=0;i<=ySteps;i++){const v=minVal+(yRange/ySteps)*i;yLabels.push({v,y:toY(v)});}

  // ── Green path (actual) ──
  const actPoints=cumActual.filter(x=>x.hasData);
  const greenPath=actPoints.map((p,i)=>`${i===0?'M':'L'}${toX(p.d).toFixed(1)},${toY(p.cum).toFixed(1)}`).join(' ');
  const greenFill=actPoints.length>1?`${greenPath} L${toX(actPoints[actPoints.length-1].d).toFixed(1)},${(H-YPAD).toFixed(1)} L${toX(actPoints[0].d).toFixed(1)},${(H-YPAD).toFixed(1)} Z`:'';

  // ── Purple projected path ──
  const projPoints=cumProj.map((v,i)=>v!==null?{d:i+1,v}:null).filter(x=>x);
  const lastAct=actPoints[actPoints.length-1];
  const projPath=projPoints.length>0?(
    (lastAct?`M${toX(lastAct.d).toFixed(1)},${toY(lastAct.cum).toFixed(1)} `:'M')+
    projPoints.map(p=>`L${toX(p.d).toFixed(1)},${toY(p.v).toFixed(1)}`).join(' ')
  ):'';

  // Warning: actual behind projection
  const behindPlan=isCurrentMo&&lastAct&&projPoints.length>0&&lastAct.cum<(projPoints[0]?.v||0)-500;

  return `
    <!-- HERO — only in Months -->
    <div class="rep-hero">
      <div class="rh-lbl">${t('monthReport')} · ${chartMo}</div>
      <div class="rh-num" style="color:${m.net>=0?'#fff':'#FF4545'};">${fmtS(m.net)} <span style="font-size:16px;color:rgba(255,255,255,.3);">Kč</span></div>
      <div class="rh-prog"><div class="rh-fill" style="width:${pct.toFixed(0)}%;background:${progColor};"></div></div>
      <div class="rh-prow"><span>0</span><span style="color:${progColor};font-weight:700;">${Math.round(m.pct)}%</span><span>${fmt(m.totalCosts)}</span></div>
    </div>

    <!-- WIDGET STRIP — swipeable, customizable -->
    ${(()=>{
      // Available widget definitions
      const daysWithData=Object.keys(boltByDay).length||1;
      const avgDay=m.gross>0?Math.round(m.gross/Math.max(1,daysWithData)):0;
      const last3=last6Data.slice(0,3).reduce((s,x)=>s+(x.calc.gross||0),0);
      const last6total=last6Data.reduce((s,x)=>s+(x.calc.gross||0),0);
      const last3net=last6Data.slice(0,3).reduce((s,x)=>s+(x.calc.net||0),0);
      const last6net=last6Data.reduce((s,x)=>s+(x.calc.net||0),0);
      const netto=m.net;
      const allWidgets={
        'netto':  {lbl:t('monthNetto'),      val:fmtS(netto),       col:netto>=0?'#01CC74':'#FF4545', sub:`${diff>=0?'▲':'▼'} ${diff>=0?'+':''}${fmt(Math.abs(diff))} vs мин.`},
        'prev':   {lbl:t('monthPrev'),          val:prevCalc?fmtS(prevCalc.net):'—', col:'rgba(255,255,255,.4)', sub:last6[1]},
        'brutto': {lbl:t('monthBrutto'),           val:'+'+fmt(m.gross),  col:'#FFB800', sub:'Bolt+планові'},
        'goal':   {lbl:'ЦІЛЬ/ДЕНЬ',        val:fmt(dailyTarget),  col:'#7BA8FF', sub:'з налаштувань'},
        'avg':    {lbl:'СЕРЕД/ДЕНЬ',       val:'+'+fmt(avgDay),   col:'#FFB800', sub:'факт цього міс.'},
        'costs':  {lbl:'ВИТРАТИ',          val:'-'+fmt(m.totalCosts), col:'#FF4545', sub:'фіксовані+разові'},
        'proj':   {lbl:'ПРОГНОЗ/30',       val:projPoints.length>0?fmtS(Math.round(projPoints[projPoints.length-1].v)):'-', col:'#A78BFA', sub:'до кінця місяця'},
        'paid':   {lbl:t('paidStatus'),         val:fmt((state.paidExpenses||[]).filter(p=>p.month===chartMo).reduce((s,p)=>s+p.amount,0)), col:'#01CC74', sub:'рахунків закрито'},
        'l3g':    {lbl:'3 МІС. BRUTTO',    val:'+'+fmt(last3),    col:'#FFB800', sub:'сума за 3 міс.'},
        'l6g':    {lbl:'6 МІС. BRUTTO',    val:'+'+fmt(last6total), col:'#FFB800', sub:'сума за 6 міс.'},
        'l3n':    {lbl:'3 МІС. NETTO',     val:fmtS(last3net),    col:last3net>=0?'#01CC74':'#FF4545', sub:'чистий за 3 міс.'},
        'l6n':    {lbl:'6 МІС. NETTO',     val:fmtS(last6net),    col:last6net>=0?'#01CC74':'#FF4545', sub:'чистий за 6 міс.'},
        'avgmo':  {lbl:'СЕРЕД/МІСЯЦЬ',     val:fmtS(Math.round(last6net/6)), col:last6net>=0?'#01CC74':'#FF4545', sub:'сер. за 6 міс.'},
      };
      const active=state.repMonthsWidgets||['netto','prev','brutto'];
      const editing=_repMonthsEdit||false;
      const allKeys=Object.keys(allWidgets);
      return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:8px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:.1em;">${t('indicators')}</span>
        <button onclick="_repMonthsEdit=!(_repMonthsEdit||false);renderReports();" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:3px 9px;font-size:9px;color:rgba(255,255,255,.4);cursor:pointer;font-family:inherit;">${editing?t('doneBtn'):t('changeBtn')}</button>
      </div>
      <div style="overflow-x:auto;scrollbar-width:none;margin-bottom:10px;padding-bottom:2px;-webkit-overflow-scrolling:touch;" ontouchstart="event.stopPropagation()">
        <div style="display:flex;gap:6px;min-width:max-content;">
          ${editing?
            allKeys.map(k=>{
              const w=allWidgets[k];
              const on=active.includes(k);
              return `<div onclick="toggleRepWidget('${k}')" style="cursor:pointer;background:${on?'rgba(75,123,255,.15)':'rgba(255,255,255,.04)'};border:1px solid ${on?'rgba(75,123,255,.3)':'rgba(255,255,255,.08)'};border-radius:12px;padding:8px 12px;min-width:90px;text-align:center;flex-shrink:0;">
                <div style="font-size:7px;color:rgba(255,255,255,.3);font-weight:600;letter-spacing:.07em;margin-bottom:3px;">${w.lbl}</div>
                <div style="font-size:13px;font-weight:700;color:${on?w.col:'rgba(255,255,255,.2)'};font-variant-numeric:tabular-nums;">${w.val}</div>
                <div style="font-size:8px;color:${on?'#4B7BFF':'rgba(255,255,255,.2)'};margin-top:3px;">${on?'✓ додано':'+ додати'}</div>
              </div>`;
            }).join('')
          :
            active.map(k=>{
              const w=allWidgets[k]; if(!w)return'';
              return `<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:8px 12px;min-width:80px;text-align:center;flex-shrink:0;">
                <div style="font-size:7px;color:rgba(255,255,255,.3);font-weight:600;letter-spacing:.07em;margin-bottom:3px;">${w.lbl}</div>
                <div style="font-size:14px;font-weight:700;color:${w.col};font-variant-numeric:tabular-nums;">${w.val}</div>
                <div style="font-size:8px;color:rgba(255,255,255,.22);margin-top:1px;">${w.sub}</div>
              </div>`;
            }).join('')
          }
        </div>
      </div>`;
    })()}

    <!-- CHART TOOLBAR -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div style="font-size:11px;font-weight:700;color:#fff;">${moNames[chartMo.slice(5)]||chartMo.slice(5)} ${chartMo.slice(0,4)}</div>
      <div style="display:flex;gap:5px;align-items:center;">
        <button onclick="shiftChartMonth(-1)" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:8px;color:rgba(255,255,255,.5);padding:4px 9px;font-size:9px;font-weight:600;cursor:pointer;font-family:inherit;">← ${moNames[String(cm===1?12:cm-1).padStart(2,'0')]}</button>
        <button onclick="setChartZoom(2)" style="background:${_chartZoom>=2?'rgba(75,123,255,.15)':'rgba(255,255,255,.06)'};border:1px solid ${_chartZoom>=2?'rgba(75,123,255,.3)':'rgba(255,255,255,.09)'};border-radius:8px;color:${_chartZoom>=2?'#7BA8FF':'rgba(255,255,255,.5)'};padding:4px 8px;font-size:12px;cursor:pointer;font-family:inherit;">⊕</button>
        <button onclick="setChartZoom(1)" style="background:${_chartZoom<=1?'rgba(75,123,255,.15)':'rgba(255,255,255,.06)'};border:1px solid ${_chartZoom<=1?'rgba(75,123,255,.3)':'rgba(255,255,255,.09)'};border-radius:8px;color:${_chartZoom<=1?'#7BA8FF':'rgba(255,255,255,.5)'};padding:4px 8px;font-size:12px;cursor:pointer;font-family:inherit;">⊖</button>
        <button onclick="shiftChartMonth(1)" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:8px;color:rgba(255,255,255,.5);padding:4px 9px;font-size:9px;font-weight:600;cursor:pointer;font-family:inherit;">${moNames[String(cm===12?1:cm+1).padStart(2,'0')]} →</button>
      </div>
    </div>

    <!-- CHART LEGEND — simple -->
    <div style="display:flex;gap:10px;margin-bottom:6px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:4px;font-size:8px;color:rgba(255,255,255,.4);">
        <svg width="14" height="6"><line x1="0" y1="3" x2="14" y2="3" stroke="#01CC74" stroke-width="2"/></svg>Факт
      </div>
      <div style="display:flex;align-items:center;gap:4px;font-size:8px;color:rgba(255,255,255,.4);">
        <svg width="14" height="6"><line x1="0" y1="3" x2="14" y2="3" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="3,2"/></svg>Прогноз
      </div>
      <div style="display:flex;align-items:center;gap:4px;font-size:8px;color:rgba(255,255,255,.4);">
        <svg width="8" height="10"><rect x="1" y="0" width="6" height="10" fill="rgba(255,69,69,.3)" rx="1"/></svg>Витрата
      </div>
      ${behindPlan?`<div style="font-size:8px;color:#FF4545;font-weight:700;">❗Відстаєш від плану</div>`:''}
    </div>

    <!-- SCROLLABLE SVG CHART -->
    <div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;margin-bottom:10px;">
      <div id="chart-scroll" style="overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;" ontouchstart="event.stopPropagation()" ontouchmove="event.stopPropagation()">
        <div style="min-width:${totalW}px;">
          <svg width="${totalW}" height="${H+20}" viewBox="0 0 ${totalW} ${H+20}">
            <defs>
              <linearGradient id="gfm" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#01CC74" stop-opacity=".18"/>
                <stop offset="100%" stop-color="#01CC74" stop-opacity="0"/>
              </linearGradient>
            </defs>

            <!-- RED TINT ZONE BELOW ZERO -->
            ${(()=>{
              const y0=toY(0);
              const yBottom=H-YPAD;
              if(y0<yBottom){
                return `<rect x="${XPAD}" y="${y0.toFixed(1)}" width="${(totalW-XPAD-4)}" height="${(yBottom-y0).toFixed(1)}" fill="rgba(255,50,50,.14)"/>
                <line x1="${XPAD}" y1="${y0.toFixed(1)}" x2="${(totalW-4)}" y2="${y0.toFixed(1)}" stroke="rgba(255,80,80,.5)" stroke-width="1.5"/>`;
              }
              return '';
            })()}

            <!-- Y GRID + LABELS -->
            ${yLabels.map(l=>{
              const isZero=Math.abs(l.v)<1;
              return `<line x1="${XPAD}" y1="${l.y.toFixed(1)}" x2="${(totalW-4)}" y2="${l.y.toFixed(1)}" stroke="${isZero?'rgba(255,100,100,.5)':'rgba(255,255,255,.05)'}" stroke-width="${isZero?2:1}" ${isZero?'stroke-dasharray="6,3"':''}/>
              <text x="2" y="${(l.y+3).toFixed(1)}" font-size="7" fill="${isZero?'rgba(255,120,120,.8)':'rgba(255,255,255,.22)'}" font-family="Inter" ${isZero?'font-weight="bold"':''}>${l.v>=1000?(l.v/1000).toFixed(0)+'k':l.v<=-1000?(l.v/1000).toFixed(0)+'k':Math.round(l.v)}</text>`;
            }).join('')}

            <!-- GREEN FILL -->
            ${greenFill?`<path d="${greenFill}" fill="url(#gfm)"/>`:''}

            <!-- GREEN LINE (actual) -->
            ${greenPath?`<path d="${greenPath}" fill="none" stroke="#01CC74" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`:''}

            <!-- RED BARS — drop FROM balance line level by expense amount -->
            ${(()=>{
              // Build balance at each future day from projPoints
              const projMap={};
              projPoints.forEach(p=>projMap[p.d]=p.v);
              // For past days use actPoints
              const actMap={};
              actPoints.forEach(p=>actMap[p.d]=p.cum);

              return Object.entries(expensesOnDay).map(([dayStr,amt])=>{
                const d=parseInt(dayStr);
                const dx=toX(d);
                const isPast=d<=todayDayNum&&isCurrentMo;
                // Balance BEFORE expense at this day
                const balBefore=isPast?(actMap[d]!==undefined?actMap[d]:0):(projMap[d]!==undefined?projMap[d]+amt:0);
                const yFrom=toY(balBefore);
                const yTo=toY(balBefore-amt);
                const barW=Math.max(DAY_W*0.6,4);
                const label=zoom>=2?`-${fmt(amt)}`:'';
                return `<rect x="${(dx-barW/2).toFixed(1)}" y="${yTo.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.abs(yFrom-yTo).toFixed(1)}" fill="rgba(255,69,69,.2)" rx="2"/>
                <line x1="${dx.toFixed(1)}" y1="${yTo.toFixed(1)}" x2="${dx.toFixed(1)}" y2="${yFrom.toFixed(1)}" stroke="#FF4545" stroke-width="${zoom>=2?2:1.5}" opacity=".75"/>
                ${label?`<text x="${(dx+3).toFixed(1)}" y="${(yTo-2).toFixed(1)}" font-size="6" fill="#FF4545" font-family="Inter">${label}</text>`:''}`;
              }).join('');
            })()}

            <!-- PURPLE PROJECTED — one continuous path through all projected points -->
            ${(()=>{
              if(!projPoints.length) return '';
              const startX=lastAct?toX(lastAct.d):toX(projPoints[0].d);
              const startY=lastAct?toY(lastAct.cum):toY(projPoints[0].v);
              const pts=`M${startX.toFixed(1)},${startY.toFixed(1)} `+
                projPoints.map(p=>`L${toX(p.d).toFixed(1)},${toY(p.v).toFixed(1)}`).join(' ');
              return `<path d="${pts}" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" opacity=".85"/>`;
            })()}

            <!-- INCOME JUMP ARROWS — vertical arrow UP on planned income days -->
            ${Object.entries(incomeOnDay).filter(([d])=>parseInt(d)>todayDayNum).map(([dayStr,amt])=>{
              const d=parseInt(dayStr);
              const dx=toX(d);
              // ptAfter = projected point ON this day (already includes income)
              // balBefore = balance on this day MINUS income = balance just before income arrives
              const ptAfter=projPoints.find(p=>p.d===d);
              const balAfter=ptAfter?ptAfter.v:0;
              const balBefore=balAfter-amt;
              const yFrom=toY(balBefore);
              const yTo=toY(balAfter);
              const label=zoom>=2?`+${fmt(amt)}`:'';
              // Arrow goes UP (yTo < yFrom since higher value = lower y coordinate)
              return `<line x1="${dx.toFixed(1)}" y1="${yFrom.toFixed(1)}" x2="${dx.toFixed(1)}" y2="${(yTo+8).toFixed(1)}" stroke="#4B7BFF" stroke-width="2" opacity=".8"/>
              <polygon points="${dx},${yTo} ${(dx-5)},${(yTo+10)} ${(dx+5)},${(yTo+10)}" fill="#4B7BFF" opacity=".85"/>
              ${label?`<rect x="${(dx+6).toFixed(1)}" y="${(yTo-1).toFixed(1)}" width="${label.length*4.8+4}" height="11" fill="rgba(75,123,255,.2)" rx="3"/><text x="${(dx+8).toFixed(1)}" y="${(yTo+8).toFixed(1)}" font-size="7" fill="#7BA8FF" font-family="Inter" font-weight="bold">${label}</text>`:''}`;
            }).join('')}

            <!-- WARNING BADGE if behind plan -->
            ${behindPlan&&lastAct?`
              <rect x="${(toX(lastAct.d)-10).toFixed(1)}" y="${(toY(lastAct.cum)-22).toFixed(1)}" width="20" height="16" fill="rgba(255,69,69,.2)" rx="4"/>
              <text x="${toX(lastAct.d).toFixed(1)}" y="${(toY(lastAct.cum)-10).toFixed(1)}" font-size="11" fill="#FF4545" text-anchor="middle" font-family="Inter">!</text>
            `:''}

            <!-- TODAY LINE + DOT -->
            ${lastAct?`
              <line x1="${toX(lastAct.d).toFixed(1)}" y1="${YPAD}" x2="${toX(lastAct.d).toFixed(1)}" y2="${(H-YPAD).toFixed(1)}" stroke="rgba(255,255,255,.13)" stroke-width="1" stroke-dasharray="3,3"/>
              <circle cx="${toX(lastAct.d).toFixed(1)}" cy="${toY(lastAct.cum).toFixed(1)}" r="5" fill="#01CC74" stroke="rgba(0,0,0,.5)" stroke-width="2"/>
            `:''}

            <!-- X AXIS LABELS -->
            ${Array.from({length:daysInMo},(_,i)=>{
              const d=i+1;
              const dx=toX(d);
              const ds=`${chartMo}-${String(d).padStart(2,'0')}`;
              const isToday=ds===todayD;
              const hasExp=expensesOnDay[d];
              const hasInc=incomeOnDay[d]&&d>todayDayNum;
              const show=zoom>=2||(d===1||d%5===0||d===daysInMo||isToday||hasExp||hasInc);
              if(!show)return'';
              const col=isToday?'#01CC74':hasExp?'rgba(255,69,69,.7)':hasInc?'rgba(75,123,255,.8)':'rgba(255,255,255,.22)';
              return `<text x="${dx.toFixed(1)}" y="${H+14}" font-size="${isToday?8.5:7}" fill="${col}" text-anchor="middle" font-family="Inter" ${isToday?'font-weight="bold"':''}>${d}${isToday?'✦':''}</text>`;
            }).join('')}
          </svg>
        </div>
      </div>
      <div style="text-align:center;font-size:7.5px;color:rgba(255,255,255,.2);padding:4px 0 8px;">← свайп щоб гортати →</div>
    </div>

    <!-- STATUS BAR -->
    ${(()=>{
      if(!behindPlan) return '';
      // Find nearest unpaid bill and how much per day needed to cover it
      const urgentBill=calcUpcoming().filter(u=>!isPaid(u.dueDay)).sort((a,b)=>a.daysUntil-b.daysUntil)[0];
      const nearestName=urgentBill?urgentBill.costs.map(c=>c.name).join(', '):'';
      const daysLeft=urgentBill?Math.max(1,urgentBill.daysUntil):1;
      const shortfall=urgentBill?Math.max(0,urgentBill.total-(lastAct?.cum||0)):0;
      const perDay=urgentBill?Math.ceil(shortfall/daysLeft):dailyTarget;
      const urgentMsg=urgentBill
        ?`${nearestName} через ${daysLeft} дн. · треба +${fmt(perDay)} Kč/день`
        :`Потрібно +${fmt(dailyTarget)} Kč/день`;
      return `<div style="background:rgba(255,69,69,.08);border:1px solid rgba(255,69,69,.2);border-radius:10px;padding:8px 12px;margin-bottom:10px;">
        <div style="font-size:9px;font-weight:700;color:#FF4545;">❗ Відстаєш від плану</div>
        <div style="font-size:9px;color:rgba(255,255,255,.4);margin-top:2px;">${urgentMsg}</div>
      </div>`;
    })()}
    <!-- HISTORY ACCORDION -->
    ${histHTML}`;
}

let _coverageExpanded=false;
function toggleCoverage(){_coverageExpanded=!_coverageExpanded;renderDash();}
let _editingBalance=false;
let _balanceChoice=null; // null | {diff, newVal} — pending choice after save
let _balanceCardChoice=false; // showing card selection

function toggleBalanceEdit(){
  _editingBalance=!_editingBalance;
  _balanceChoice=null;
  _balanceCardChoice=false;
  renderDash();
}

function saveManualBalance(){
  const v=parseInt(document.getElementById('manual-bal-inp')?.value);
  if(isNaN(v)){_editingBalance=false;renderDash();return;}
  const rd=calcRingData();
  // diff is measured against RAW money-on-hand (before any correction),
  // so editing twice in one day always lands on the latest entered value.
  const base=(rd.netActualRaw!=null)?rd.netActualRaw:rd.netActual;
  const diff=v-base;
  if(Math.abs(diff)<1){
    // entered value equals the true fact → clear any stray corrections for today
    _clearTodayCorrections();
    save();_editingBalance=false;_balanceChoice=null;renderDash();return;
  }
  if(diff>0){
    // Adding money → always income
    _applyBalanceIncome(diff);
  } else {
    // Subtracting → show choice (plain expense / mark a card as paid)
    _balanceChoice={diff, newVal:v};
    _editingBalance=false;
    renderDash();
  }
}

// Remove ALL balance corrections (any date, both income & expense sides).
// Only one correction should exist at a time — the latest one wins.
function _clearTodayCorrections(){
  state.oneTimeIncome=(state.oneTimeIncome||[]).filter(e=>e.name!=='Корекція балансу');
  state.oneTimeExpenses=(state.oneTimeExpenses||[]).filter(e=>e.name!=='Корекція балансу');
}

function _applyBalanceIncome(amount){
  if(!state.oneTimeIncome)state.oneTimeIncome=[];
  const d=today();
  // Save ALL corrections (any date) for undo restore
  const prevInc=(state.oneTimeIncome||[]).filter(e=>e.name==='Корекція балансу');
  const prevExp=(state.oneTimeExpenses||[]).filter(e=>e.name==='Корекція балансу');
  _clearTodayCorrections();
  const item={id:Date.now()+'',name:'Корекція балансу',amount,date:d};
  state.oneTimeIncome.push(item);
  save();
  _editingBalance=false;_balanceChoice=null;_balanceCardChoice=false;
  renderDash();
  showUndoToast('✏️','Баланс оновлено',`+${fmt(amount)} Kč`,()=>{
    state.oneTimeIncome=(state.oneTimeIncome||[]).filter(e=>e.id!==item.id);
    prevInc.forEach(e=>state.oneTimeIncome.push(e));
    if(prevExp.length){state.oneTimeExpenses=state.oneTimeExpenses||[];prevExp.forEach(e=>state.oneTimeExpenses.push(e));}
    save();renderDash();
  });
}

function _applyBalanceExpense(amount){
  if(!state.oneTimeExpenses)state.oneTimeExpenses=[];
  const d=today();
  // Save ALL corrections (any date) for undo restore
  const prevInc=(state.oneTimeIncome||[]).filter(e=>e.name==='Корекція балансу');
  const prevExp=(state.oneTimeExpenses||[]).filter(e=>e.name==='Корекція балансу');
  _clearTodayCorrections();
  const item={id:Date.now()+'',name:'Корекція балансу',amount,date:d};
  state.oneTimeExpenses.push(item);
  save();
  _editingBalance=false;_balanceChoice=null;_balanceCardChoice=false;
  renderDash();
  showUndoToast('✏️','Витрату записано',`-${fmt(amount)} Kč`,()=>{
    state.oneTimeExpenses=(state.oneTimeExpenses||[]).filter(e=>e.id!==item.id);
    prevExp.forEach(e=>state.oneTimeExpenses.push(e));
    if(prevInc.length){state.oneTimeIncome=state.oneTimeIncome||[];prevInc.forEach(e=>state.oneTimeIncome.push(e));}
    save();renderDash();
  });
}

function _applyBalanceAsCardPayment(dueDay){
  // Mark the selected card as paid (same as markAsPaid but from balance editor).
  // The difference is accounted by the bill becoming "paid", so we must NOT
  // also keep a balance-correction expense for today — clear it first.
  const upcoming=calcUpcoming();
  const u=upcoming.find(x=>x.dueDay===dueDay);
  if(!u){_balanceChoice=null;renderDash();return;}
  if(!state.paidExpenses)state.paidExpenses=[];
  const mo=todayMonth();
  _clearTodayCorrections();
  state.paidExpenses=state.paidExpenses.filter(p=>!(p.dueDay===dueDay&&p.month===mo));
  state.paidExpenses.push({dueDay,month:mo,amount:u.total,names:u.costs.map(c=>c.name).join(', '),paidDate:today()});
  save();
  _editingBalance=false;_balanceChoice=null;_balanceCardChoice=false;
  renderDash();
  showUndoToast('💳','Оплату підтверджено',u.costs.map(c=>c.name).join(', ')+` · -${fmt(u.total)} Kč`,()=>{
    state.paidExpenses=(state.paidExpenses||[]).filter(p=>!(p.dueDay===dueDay&&p.month===mo));
    save();renderDash();
  });
}

function calcWeekByOffset(offset){
  // offset 0 = current week, 1 = last week, etc.
  const d=new Date(); const day=d.getDay()||7;
  const mon=new Date(d); mon.setDate(d.getDate()-day+1-offset*7);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const from=mon.toISOString().slice(0,10), to=sun.toISOString().slice(0,10);
  const orders=ordersForWeek(from,to);
  const boltGross=orders.reduce((a,o)=>a+(o.order_price?.net_earnings||0),0);
  const boltKm=orders.reduce((a,o)=>a+(o.ride_distance||0),0)/1000;
  const s=state.settings;
  const km=s.boltKmEnabled ? boltKm : getOdometerKmForPeriod(from,to);
  const vc=calcVarCosts(km);
  const oneTimeInc=(state.oneTimeIncome||[]).filter(e=>e.date>=from&&e.date<=to&&e.name!=='Корекція балансу').reduce((a,e)=>a+e.amount,0);
  const oneTimeExp=(state.oneTimeExpenses||[]).filter(e=>e.date>=from&&e.date<=to&&e.name!=='Корекція балансу').reduce((a,e)=>a+e.amount,0);
  const gross=boltGross+oneTimeInc;
  const netFull=gross-vc.total-oneTimeExp;
  return {from,to,boltGross,oneTimeInc,oneTimeExp,km,vc,gross,netFull,trips:orders.length};
}

          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:14px;font-weight:700;color:${col};">${fmtS(wk.netFull)} Kč</span>
            <span id="${wid}-arr" style="font-size:14px;color:rgba(255,255,255,.2);">›</span>
          </div>
        </div>
        <div id="${wid}-body" style="display:none;padding:0 16px 12px 16px;">
          <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);"><span style="font-size:12px;color:rgba(255,255,255,.4);">Bolt дохід</span><span style="font-size:12px;font-weight:600;color:#4FC3F7;">+${fmt(wk.boltGross)} Kč</span></div>
          ${wk.oneTimeInc>0?`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);"><span style="font-size:12px;color:rgba(255,255,255,.4);">Інші доходи</span><span style="font-size:12px;font-weight:600;color:#34D399;">+${fmt(wk.oneTimeInc)} Kč</span></div>`:''}

        </div>
      </div>
    </div>

    <!-- WEEK COMPARE CHART -->
    ${(()=>{
      // build last 6 weeks
      const weeks=[];
      for(let i=5;i>=0;i--){
        const wk=calcWeekByOffset(i);
        const label=wk.from.slice(5).replace('-','.').replace(/^0/,'');
        weeks.push({wk,label,i});
      }
      const maxVal=Math.max(...weeks.map(x=>Math.abs(x.wk.netFull)),1);
      const barH=76; const barW=32; const gap=10; const topPad=16;
      const svgW=weeks.length*(barW+gap); const svgH=topPad+barH+42;
      const baseline=topPad+barH;
      const bars=weeks.map(({wk,label,i},idx)=>{
        const v=wk.netFull; const pct=Math.round((v/maxVal)*100);
        const h=Math.max(2,Math.round((Math.abs(v)/maxVal)*barH));
        const col=v>=0?(i===0?'#4B7BFF':'#01CC74'):'#FF4545';
        const x=idx*(barW+gap);
        const y=baseline-h;
        const isCurrent=i===0;
        // % label: always at least topPad-2 from top so it never clips
        const lblY=Math.max(topPad-2, y-5);
        return `
          <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="5" fill="${col}" opacity="${isCurrent?'1':'.65'}"/>
          ${v!==0?`<!-- no pct label -->`:''}
          <text x="${x+barW/2}" y="${baseline+13}" text-anchor="middle" font-size="8" fill="${isCurrent?'rgba(255,255,255,.7)':'rgba(255,255,255,.35)'}" font-family="Inter,sans-serif">${label}</text>
          <text x="${x+barW/2}" y="${baseline+25}" text-anchor="middle" font-size="7" fill="${col}" font-family="Inter,sans-serif" font-weight="600">${v===0?'–':fmtS(v)}</text>`;
      }).join('');
      return `<div class="wk-compare" style="padding:14px 16px;">
        <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.12em;margin-bottom:12px;">${t('weekCompare')}</div>

            <line x1="0" y1="${baseline}" x2="${svgW}" y2="${baseline}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
            ${bars}
          </svg>
        </div>
      </div>`;
    })()}

    ${buildWeekHistory()}`;
}

  const n=document.getElementById('dx-name-'+d)?.value.trim();
  const a=parseInt(document.getElementById('dx-amt-'+d)?.value)||0;
  if(!n||!a){showToast(t('fillAll'));return;}
  if(!state.oneTimeIncome)state.oneTimeIncome=[];
  const item={id:Date.now()+'',name:n,amount:a,date:d};
  state.oneTimeIncome.push(item);
  save(); renderReports(); renderDash();
  showUndoToast('➕','Дохід додано',`${n} · +${fmt(a)} Kč`,()=>{
    state.oneTimeIncome=state.oneTimeIncome.filter(e=>e.id!==item.id);
    save(); renderReports(); renderDash();
  });
}
function toggleYear(yr){
  const body=document.getElementById('yr-body-'+yr);
  const arrow=document.getElementById('yr-arrow-'+yr);
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  arrow.style.transform=open?'rotate(180deg)':'';
}
function toggleMonth(mo){
  const body=document.getElementById('mo-body-'+mo);
  const arrow=document.getElementById('mo-arrow-'+mo);
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  arrow.textContent=open?'⌄':'›';
}

function shareReport(){
  const w=calcWeek();

  const wFrom=from.slice(5).replace('-','.');
  const wTo=to.slice(5).replace('-','.');
  const txt=
`📊 DriveStat · Тижневий звіт
👤 ${state.user} · ${wFrom}–${wTo}
━━━━━━━━━━━━━━━━━━━━

⚡ Bolt дохід: +${fmt(w.boltGross)} Kč
${w.vc.fuel>0?`⛽ Пальне: -${fmt(w.vc.fuel)} Kč\n`:''}${w.vc.amort>0?`🔧 Амортизація: -${fmt(w.vc.amort)} Kč\n`:''}${w.weeklyFixed>0?`🚙 Тижневі витрати: -${fmt(w.weeklyFixed)} Kč\n`:''}
━━━━━━━━━━━━━━━━━━━━
💰 Чистий: ${fmtS(w.netFull)} Kč
━━━━━━━━━━━━━━━━━━━━
DriveStat`;
  navigator.clipboard.writeText(txt).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=txt;

function saveMainSettings(){

    const v=parseInt(el.value);
    if(!isNaN(v)&&v>0) state.settings.dailyGoal=v;
  }

}

  state.settings.incomeTaxRate=parseInt(document.getElementById('st-taxrate')?.value)||15;
